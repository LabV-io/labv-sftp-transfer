name: Build and publish release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux native release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle.kts', '**/settings.gradle.kts') }}

      - name: Set up GraalVM Java 21 LTS
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          components: 'native-image'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build fat JAR
        run: |
          ./gradlew clean fatJar

      - name: Build native Linux executable
        run: |
          native-image --no-fallback --enable-http --enable-https --verbose \
            -jar build/libs/labv-sftp-transfer-all.jar \
            -H:Name=labv-sftp-transfer

      - name: Package Linux release
        run: tar -czf labv-sftp-transfer-linux.tar.gz labv-sftp-transfer

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: labv-sftp-transfer-linux
          path: labv-sftp-transfer-linux.tar.gz

  build-macos:
    name: Build macOS native release
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle.kts', '**/settings.gradle.kts') }}

      - name: Set up GraalVM Java 21 LTS
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          components: 'native-image'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build fat JAR
        run: |
          ./gradlew clean fatJar

      - name: Build native macOS executable
        run: |
          native-image --no-fallback --enable-http --enable-https --verbose \
            -jar build/libs/labv-sftp-transfer-all.jar \
            -H:Name=labv-sftp-transfer

      - name: Package macOS release
        run: tar -czf labv-sftp-transfer-macos.tar.gz labv-sftp-transfer

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: labv-sftp-transfer-macos
          path: labv-sftp-transfer-macos.tar.gz

  build-windows:
    name: Build Windows native release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle.kts', '**/settings.gradle.kts') }}

      - name: Set up GraalVM Java 21 LTS
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          components: 'native-image'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build fat JAR
        shell: pwsh
        run: .\gradlew.bat clean fatJar
      - name: Prepare Windows package
        shell: pwsh
        run: |
          Write-Host "=== Prepare Windows package ==="
          Write-Host "JAR files in build\\libs:"
          Get-ChildItem build\\libs -Filter *.jar -Force
          Write-Host "Copying fat JAR to workspace root"
          Copy-Item build\\libs\\labv-sftp-transfer-all.jar -Destination . -Force
          Write-Host "Creating run.bat launcher"
          Set-Content -Path run.bat -Value '@echo off\r\njava -jar labv-sftp-transfer-all.jar %*' -Force
          Write-Host "Directory listing before archive:"
          Get-ChildItem -Force
          Write-Host "Creating ZIP archive containing JAR + run.bat"
          Compress-Archive -Path labv-sftp-transfer-all.jar,run.bat -DestinationPath labv-sftp-transfer-windows.zip -Force
          Write-Host "Created labv-sftp-transfer-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: labv-sftp-transfer-windows
          path: labv-sftp-transfer-windows.zip

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: labv-sftp-transfer-linux
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: labv-sftp-transfer-macos
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: labv-sftp-transfer-windows
          path: dist

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            Automatisch erstelltes Release für Tag `${{ github.ref_name }}`.
            
            Plattformen:
            - Linux
            - macOS
            - Windows
          draft: false
          prerelease: false

      - name: Upload Linux asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/labv-sftp-transfer-linux.tar.gz
          asset_name: labv-sftp-transfer-linux.tar.gz
          asset_content_type: application/gzip

      - name: Upload macOS asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/labv-sftp-transfer-macos.tar.gz
          asset_name: labv-sftp-transfer-macos.tar.gz
          asset_content_type: application/gzip

      - name: Upload Windows asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/labv-sftp-transfer-windows.zip
          asset_name: labv-sftp-transfer-windows.zip
          asset_content_type: application/zip
